name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-freebsd

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
            targets: ${{ matrix.target }}

      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ferros3-${{ matrix.target }}.tar.gz ferros3

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: target/${{ matrix.target }}/release/ferros3-${{ matrix.target }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-freebsd11:
    name: Build for FreeBSD 11.2 (legacy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # FreeBSD 11.2 needs a from-source std build (-Z build-std) against a real
      # 11.2 sysroot, so it uses the dedicated Docker pipeline instead of `cross`.
      - name: Build (Docker + build-std)
        run: ./build-freebsd11.sh

      - name: Package
        run: |
          # Docker builds as root, so the artifacts are root-owned on the host.
          sudo chown -R "$USER" target/x86_64-unknown-freebsd/release
          cd target/x86_64-unknown-freebsd/release
          tar -czvf ferros3-x86_64-unknown-freebsd11.tar.gz ferros3

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: target/x86_64-unknown-freebsd/release/ferros3-x86_64-unknown-freebsd11.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
